# Application Configuration
spring.application.name=ResumeScanner
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/resume_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=smruti-77
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Groq API Configuration
groq.api.api-key=${GROQ_API_KEY}

groq.api.base-url=${GROQ_API_URL}

groq.api.model=llama-3.1-8b-instant
groq.api.temperature=0.1
groq.api.max-tokens=4096

# Logging Configuration
logging.level.com.example.ResumeScanner=DEBUG
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n